        function applyTheme(themeName) {
            document.body.classList.remove('theme-gray');
            if (themeName === 'gray') {
                document.body.classList.add('theme-gray');
            }
            localStorage.setItem('selectedTheme', themeName);
            
            document.querySelectorAll('.theme-card').forEach(card => {
                card.classList.remove('active');
                if (card.getAttribute('data-theme') === themeName) {
                    card.classList.add('active');
                }
            });
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('selectedTheme');
            if (savedTheme === 'gray') {

            } else {
                document.querySelector('.theme-card[data-theme="default"]').classList.add('active');

        // === دوال السحب والترتيب (للأقسام وللخيارات داخل كل قسم) ===
        function enableSorting() {
            // ترتيب الأقسام الرئيسية
            $("#menuContainer").sortable({
                items: ".menu-section",
                cursor: "move",
                placeholder: "sort-mode-active",
                tolerance: "pointer",
                update: function() {
                    saveSectionsOrder();
                    // إعادة تمكين الترتيب الداخلي بعد تحديث الأقسام
                    setTimeout(() => enableItemsSorting(), 100);
                }
            });
            $("#menuContainer").sortable("enable");
            
            enableItemsSorting();
        }
        
        function enableItemsSorting() {
            // ترتيب الخيارات داخل كل قسم
            $(".menu-section-items").each(function() {
                if ($(this).hasClass("ui-sortable")) {
                    $(this).sortable("destroy");
                }
                $(this).sortable({
                    items: ".menu-btn",
                    cursor: "move",
                    placeholder: "sort-mode-active",
                    tolerance: "pointer",
                    update: function(event, ui) {
                        const sectionTitle = $(this).closest('.menu-section').find('.menu-section-title').text();
                        saveItemsOrder(sectionTitle);
                    }
                });
                $(this).sortable("enable");
            });
        }

        function disableSorting() {
            if ($("#menuContainer").hasClass("ui-sortable")) {
                $("#menuContainer").sortable("disable");
            }
            $(".menu-section-items").each(function() {
                if ($(this).hasClass("ui-sortable")) {
                    $(this).sortable("disable");
                }
            });
        }

        function saveSectionsOrder() {
            const sections = [];
            $("#menuContainer .menu-section").each(function() {
                const title = $(this).find(".menu-section-title").text();
                const originalSection = MENU_STRUCTURE.find(s => s.title === title);
                if (originalSection) {
                    sections.push(originalSection);
                }
            });
            if (sections.length === MENU_STRUCTURE.length) {
                MENU_STRUCTURE.length = 0;
                sections.forEach(s => MENU_STRUCTURE.push(s));
                localStorage.setItem('menuSectionsOrder', JSON.stringify(MENU_STRUCTURE.map(s => s.title)));
                // لا نعيد بناء القائمة كاملة حتى لا نخسر الترتيب الداخلي
                updateSectionsDOM();
            }
        }
        
        function updateSectionsDOM() {
            const menuContainer = document.getElementById('menuContainer');
            const sections = Array.from(menuContainer.querySelectorAll('.menu-section'));
            const newOrder = [];
            $("#menuContainer .menu-section").each(function() {
                const title = $(this).find(".menu-section-title").text();
                newOrder.push(title);
            });
            // إذا تغير الترتيب، نعيد ترتيب DOM بناءً على MENU_STRUCTURE الجديد
            if (JSON.stringify(newOrder) !== JSON.stringify(MENU_STRUCTURE.map(s => s.title))) {
                const parent = menuContainer;
                const children = Array.from(parent.children);
                const orderedChildren = [];
                MENU_STRUCTURE.forEach(section => {
                    const child = children.find(c => c.querySelector('.menu-section-title')?.textContent === section.title);
                    if (child) orderedChildren.push(child);
                });
                orderedChildren.forEach(child => parent.appendChild(child));
            }
        }

        function saveItemsOrder(sectionTitle) {
            const section = MENU_STRUCTURE.find(s => s.title === sectionTitle);
            if (!section) return;
            
            const sectionElement = $("#menuContainer .menu-section").filter(function() {
                return $(this).find(".menu-section-title").text() === sectionTitle;
            }).first();
            
            const orderedItems = [];
            sectionElement.find(".menu-btn").each(function() {
                const itemText = $(this).find("span").text();
                const originalItem = section.items.find(i => i.text === itemText);
                if (originalItem) {
                    orderedItems.push(originalItem);
                }
            });
            
            if (orderedItems.length === section.items.length) {
                section.items.length = 0;
                orderedItems.forEach(i => section.items.push(i));
                localStorage.setItem(`menuItemsOrder_${sectionTitle}`, JSON.stringify(section.items.map(i => i.text)));
            }
        }

        function loadSectionsOrder() {
            const savedOrder = localStorage.getItem('menuSectionsOrder');
            if (savedOrder) {
                const orderTitles = JSON.parse(savedOrder);
                const newOrder = [];
                for (let title of orderTitles) {
                    const section = MENU_STRUCTURE.find(s => s.title === title);
                    if (section) newOrder.push(section);
                }
                MENU_STRUCTURE.forEach(section => {
                    if (!newOrder.includes(section)) newOrder.push(section);
                });
                if (newOrder.length === MENU_STRUCTURE.length) {
                    MENU_STRUCTURE.length = 0;
                    newOrder.forEach(s => MENU_STRUCTURE.push(s));
                }
            }
        }

        function loadItemsOrders() {
            MENU_STRUCTURE.forEach(section => {
                const savedOrder = localStorage.getItem(`menuItemsOrder_${section.title}`);
                if (savedOrder) {
                    const orderTexts = JSON.parse(savedOrder);
                    const newOrder = [];
                    for (let text of orderTexts) {
                        const item = section.items.find(i => i.text === text);
                        if (item) newOrder.push(item);
                    }
                    section.items.forEach(item => {
                        if (!newOrder.includes(item)) newOrder.push(item);
                    });
                    if (newOrder.length === section.items.length) {
                        section.items.length = 0;
                        newOrder.forEach(i => section.items.push(i));
                    }
                }
            });
        }

        function submitSubscription() {
            const email = document.getElementById('subscribeEmail').value;
            if (!email || !email.includes('@')) {
                showMessage('⚠️ الرجاء إدخال بريد إلكتروني صحيح', 'error');
                return;
            }
            
            if (subscribedEmails.includes(email)) {
                showMessage('⚠️ هذا البريد مسجل مسبقاً! يمكنك إلغاء الاشتراك من الأسفل', 'error');
                return;
            }
            
            fetch(SITE_CONFIG.googleScriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email, 
                    date: new Date().toISOString(),
                    action: 'subscribe'
                })
            }).then(() => {
                subscribedEmails.push(email);
                saveSubscribedEmails();
                showMessage('✅ تم الاشتراك بنجاح! ستصل إليك التحديثات قريباً.', 'success');
                closeSubscribeModal();
            }).catch(() => {
                subscribedEmails.push(email);
                saveSubscribedEmails();
                showMessage('✅ تم الاشتراك بنجاح!', 'success');
                closeSubscribeModal();
            });
        }
        
        function unsubscribeEmail() {
            const email = document.getElementById('unsubscribeEmail').value;
            if (!email || !email.includes('@')) {
                showMessage('⚠️ الرجاء إدخال بريد إلكتروني صحيح', 'error');
                return;
            }
            
            const index = subscribedEmails.indexOf(email);
            if (index !== -1) {
                subscribedEmails.splice(index, 1);
                saveSubscribedEmails();
            }
            
            fetch(SITE_CONFIG.googleScriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email, 
                    action: 'unsubscribe'
                })
            }).then(() => {
                showMessage('✅ تم إلغاء الاشتراك بنجاح! لن تصلك أي تحديثات مستقبلية.', 'success');
                closeSubscribeModal();
            }).catch(() => {
                showMessage('✅ تم إلغاء الاشتراك بنجاح!', 'success');
                closeSubscribeModal();
            });
        }

        function buildMenu() {
            const menuContainer = document.getElementById('menuContainer');
            if (!menuContainer) return;
            menuContainer.innerHTML = '';
            
            MENU_STRUCTURE.forEach((section) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'menu-section';
                
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'menu-section-items';
                
                section.items.forEach(item => {
                    let actionAttr = '';
                    if (item.action === 'iframe') {
                        actionAttr = `loadIframe('${item.url}')`;
                    } else if (item.action === 'link') {
                        actionAttr = `window.open('${item.url}', '_blank')`;
                    } else if (item.action === 'home') {
                        actionAttr = `showWelcome()`;
                    } else if (item.action === 'subscribe') {
                        actionAttr = `showSubscribeModal()`;
                    } else if (item.action === 'email') {
                        actionAttr = `window.location.href = 'mailto:${item.url}'`;
                    }
                    
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn';
                    btn.innerHTML = `<i class="${item.icon}"></i><span>${item.text}</span>`;
                    btn.onclick = () => eval(actionAttr);
                    itemsContainer.appendChild(btn);
                });
                
                sectionDiv.innerHTML = `<div class="menu-section-title">${section.title}</div>`;
                sectionDiv.appendChild(itemsContainer);
                menuContainer.appendChild(sectionDiv);
            });
            
            const emailDiv = document.createElement('div');
            emailDiv.className = 'email-text';
            emailDiv.innerHTML = `<i class="fas fa-envelope"></i> ${SITE_CONFIG.email}`;
            menuContainer.appendChild(emailDiv);
            
            if (sortMode) {
                setTimeout(() => enableSorting(), 50);
            }
        }

        function loadIframe(url) {
            const container = document.getElementById('iframeContainer');
            if (!container) return;
            container.innerHTML = `<div class="loading" id="loadingIndicator"><i class="fas fa-spinner"></i> جاري التحميل...</div><iframe id="contentFrame" src="${url}" style="width:100%; height:100%; display:none;" onload="hideLoading()"></iframe>`;
        }

        function hideLoading() {
            const loading = document.getElementById('loadingIndicator');
            const iframe = document.getElementById('contentFrame');
            if (loading && iframe) { loading.style.display = 'none'; iframe.style.display = 'block'; }
        }
